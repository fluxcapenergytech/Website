text15: "Converting AI data centre waste heat into electricity."

text26: |
  Data centers are the energy infrastructure challenge of our time. Currently, their excess heat is vented as waste. But we see it as a fuel source.

  Our technology will harvest data centre heat as an asset and convert it back into electricity to power each AI data centre more efficiently and sustainably.

  As we move toward our MVP and initial pilots, we are building the new standard for energy recovery. **Join us.**

