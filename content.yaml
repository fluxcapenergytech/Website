# Physics & Engineering Section
# ---------------------------------------------------------------------------

text22: "The Physics & Engineering."

text17: "FluxTech's system is a closed-loop thermoacoustic engine. It connects to the data centre's cooling fluid on one side and produces electricity on the other. The sections below trace the conversion end to end."

text18: |
  **Thermal Capture.**<br /> Low-grade waste heat (40–65°C) is drawn from the server cooling circuit through high-efficiency printed circuit heat exchangers. This thermal energy is transferred to our working fluid: supercritical CO₂ (sCO₂).

text19: |
  **Acoustic Amplification.**<br /> Near its critical point, sCO₂ becomes hyper-sensitive to temperature changes. As the fluid absorbs heat, it expands and contracts, creating self-sustaining acoustic pressure waves within a resonant cavity. By using sCO₂, we gain the thermodynamic leverage required to operate in the "Dead Zone" where traditional turbines fail.

text20: |
  **Energy conversion.**<br /> These high-energy acoustic waves drive a linear alternator to generate electricity. Because the conversion is driven by sound rather than rotation, the engine contains no moving parts—no turbines, no pistons, and no bearings. Reliability is structural.

text21: |
  **AI Optimization.**<br /> Operating near the critical point is inherently nonlinear and unstable. Our proprietary AI control system monitors operational data in real-time, adjusting valve timing and flow rates every second to keep the system in its highest efficiency band.

text28: |
  **Seamless Integration.**<br /> FluxTech is the cooling pathway in normal operation. The existing cooling stack stays in place as backup; on fault, the engine decouples automatically and uptime is unaffected. Residual heat after electricity extraction is passed through at the appropriate temperature for secondary reuse.

text-heatmod: |
  **Heat Modulation.**<br /> Our core differentiating mechanism. Controlled, phase-locked thermal exchange synchronises heat input with the engine’s acoustic cycle, maximising energy transfer at each oscillation. This architecture has no published precedent and is the subject of our first ZIM feasibility study.

