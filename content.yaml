# ---------------------------------------------------------------------------
# Problem Section
# ---------------------------------------------------------------------------

text16: "The Problem."

text07: |
  Data centres are the engine rooms of our time, yet they are running into a hard wall: power. Jensen Huang identifies it as the single biggest bottleneck for scaling AI. Data centres consumed 415 TWh of electricity in 2024 — projected to reach 945 TWh by 2030 as AI workloads explode. That is nearly double Germany’s total annual electricity consumption.

  The constraint is not just total energy — it is the grid’s ability to deliver it. New data centres face multi-year waits for grid connections. Operators are hitting peak demand ceilings that limit how many racks they can fill. Every kilowatt-hour generated on-site is a kilowatt-hour not drawn from the grid — reducing dependency, lowering peak demand charges, and unlocking rack density that grid constraints currently block.

  Meanwhile, 10-30% of that consumed power goes to cooling, which vents heat as waste. All the while, the EU’s Energy Efficiency Directive mandates energy performance reporting for data centres, and Germany’s Energy Efficiency Act requires new data centres to reuse waste heat from July 2026. Regulation is compounding economic pressure that already exists.

  The heat is there. The need for power is desperate. No viable technology bridges the two.
text09: |
  Data Centre Electricity Consumption (2020-2030) (TWh)<br /> <sub>IEA (2025), Global data centre electricity consumption, by equipment, Base Case, 2020-2030, IEA, Paris. Licence: CC BY 4.0</sub>

text30: |
  **Physics created limitations.**

  So why aren't people converting waste heat into electricity already? The barrier to recovering waste heat as an energy source has always been the "Thermodynamic Dead Zone." At 40–65°C rack output, data center heat is too cool for traditional turbines (ORC) while standard thermoelectric devices often operate at less than 1% efficiency. This physics constraint makes the conversion to electricity economically unviable for the legacy market.

  FluxTech is solving this. By utilizing supercritical CO₂ (sCO₂) as a working fluid, we gain the thermodynamic leverage required to operate with high efficiency in this temperature range. Combined with our proprietary AI control systems, we can close the loop by capturing the surplus heat and converting it into electricity.

