text-bm-title: "The Business Model."

text-bm-intro: |
  **Energy as a Service.**

  We install, own, and operate the hardware. Customers pay for every kWh generated from their waste heat. All performance risk sits with FluxTech. If the engine produces nothing, the customer pays nothing.

  The engine modulates between electricity recovery and heat delivery, capturing whichever revenue stream is paying more.

  This model aligns incentives across all three stakeholders: every efficiency improvement flows directly into revenue, with no intermediary step.

text-bm-customer: |
  **For the Customer.**

  No capital outlay. No operational burden. Revenue from infrastructure they already own. FluxTech operates as the cooling pathway. If the engine stops, uptime is unaffected and the customer owes nothing.

text-bm-fluxtech: |
  **For FluxTech.**

  Hardware ownership captures the full value of every efficiency gain. Revenue scales directly with technology performance. Fleet ownership enables modular upgrades in the field and circular lifecycle management — replaced units are refurbished and redeployed.

text-bm-investor: |
  **For the Investor.**

  Recurring revenue tied to a cost the customer already pays. Performance compounds into revenue without new customer acquisition. Fleet growth enables project finance — borrowing against contracted revenue to fund expansion — reducing equity dilution in later phases.

text-bm-pricing: |
  **Pricing Structure.**

  Two components: a fixed base rate covering cooling provision, agreed at signing, and a floating component tied to the market value of recovered electricity and heat passed through for reuse. The fixed component provides the revenue predictability that project finance requires. The floating component aligns incentives on the variable streams: transparent benchmarks against local market prices mean neither party can game the rate.

text-bm-contracts: |
  ==Three-year initial agreements== with renegotiation at renewal. Early-phase contracts prioritise adoption speed; as the technology matures, terms shift toward longer-duration agreements suited to project finance.

  ==Zero downtime risk to the customer.== If a unit is not generating electricity, the customer pays nothing. The engine decouples from the cooling loop; data centre operations are unaffected.

  ==Fleet scaling via project finance.== Once units generate revenue under contract, the revenue stream becomes an asset for debt financing. Each performing cohort strengthens borrowing terms for the next. Equity funds the company through technical de-risking; growth capital increasingly comes from debt markets.

