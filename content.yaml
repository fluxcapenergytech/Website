text32: "The Team."

text08: |
  **John Therrien | Co-Founder & Engine Architect.**

  ==Where thermodynamics meets control theory.==

  John holds a double major in Physics and Mechanical Engineering from UC Santa Barbara — a five-year program spanning two colleges. That dual foundation converges directly in the nonlinear physics at the core of FluxTech’s engine architecture.

  Before FluxTech, John spent five years as a professional musician, an experience that sharpened pattern recognition, rapid iteration, and comfort with ambiguity. The engine architecture, working fluid choice, and AI control approach emerged from independent inquiry into low-temperature heat conversion — a problem the industry had written off.

  *“This whole field of problems keeps me awake at night in the best way possible; it’s truly fascinating. The ecological impact feels tangible, the economic side gains strength every time I check the news, and I love where it sits with compelling interdisciplinary depth. It’s the perfect mix to drive the kind of obsession necessary for a successful startup.”*
text14: |
  **Florian Schmack | Co-Founder & Materials Lead.**

  ==Materials define limits. Engineering overcomes them.==

  Flo holds a master’s degree in materials science from TU Berlin, specialising in light metals and high-purity synthesis. At PSC Technologies, he pioneered a method for identifying silicon impurities below 0.1% — a breakthrough that eliminated false positives in battery testing and set a new standard for material analysis.

  In 2024, Florian integrated his materials expertise with advanced data science at the WBS Coding School, specialising in Machine Learning and Cloud Computing. This intersection of physical metallurgy and predictive analytics is the engine behind FluxTech’s proprietary control systems. Today, Flo leads the technical development of our supercritical CO₂ systems and the construction of the TRL 4 research platform.

  *“We are not just managing heat, we are harvesting a previously invisible resource. Let’s turn the waste of today into the power of tomorrow.”*
