text10: "The Market."

text27: |
  The market for FluxTech’s technology is not just large, it is structurally inevitable due to the convergence of two things: surging demand for AI and the avoided load advantage.

  The scale of the opportunity is defined by the explosive growth of data centres, which are projected to consume 945 TWh of electricity by 2030, driven largely by energy-intensive AI workloads.

  The avoided load advantage is the ability to generate power on-site to bypass grid capacity constraints. By reducing the total draw from the grid, operators can lower peak demand charges that currently limit rack density.

  We are seeing immediate market pull for three specific reasons.

text12: |
  **Economic Compulsion.**<br /> High energy prices, particularly in Europe, make efficiency economically valuable independent of regulation. In our initial addressable segment alone, every percentage point of engine efficiency adds approximately €4M in annual revenue at scale. In grid-constrained markets like Frankfurt and London, every recovered MW unlocks compute capacity worth far more than retail electricity.

text24: |
  **Commercial Validation.**<br /> We have already secured three signed LOIs with deployment partners Deep Green, Leafcloud, and Heata, whose deployment pipelines represent up to 2.6 TWh of recoverable low-temperature waste heat, anchored by Deep Green's publicly stated 300 MW buildout across the UK and North America.
text25: |
  **Binding Sustainability Mandates.**<br /> The EU’s Energy Efficiency Directive mandates energy performance reporting for data centres, with minimum standards planned for 2026. Germany’s Energy Efficiency Act requires new data centres to reuse waste heat — creating direct regulatory demand for energy recovery infrastructure.

