    </main>

    <a class="back-to-top" href="#home" id="backToTop"><span aria-hidden="true">↑</span> Top</a>

    <footer class="site-footer">
      <div class="site-footer__social">
        <a href="https://www.linkedin.com/company/flux-tech-de/" aria-label="FluxTech on LinkedIn">
          <svg aria-hidden="true" focusable="false"><use xlink:href="#icon-bf393d6ea48a4e69e1ed58a3563b94a5"></use></svg>
          <span class="label">LinkedIn</span>
        </a>
      </div>
      <p>FluxTech — Converting AI data centre waste heat into electricity.</p>
      <p class="muted">
        Strategic Communications, Brand, and Website by <a href="https://shamsara.carrd.co/">Sham Sara</a>.
      </p>
    </footer>

    <!-- Pitch video lightbox (launched from the hero) -->
    <div
      class="video-lightbox"
      id="videoLightbox"
      role="dialog"
      aria-modal="true"
      aria-label="FluxTech pitch video"
    >
      <div class="video-lightbox__container">
        <button class="video-lightbox__close" type="button" aria-label="Close video" data-close-video>&times;</button>
        <div class="video-lightbox__wrap">
          <iframe
            id="lightboxIframe"
            src=""
            title="FluxTech pitch video"
            allow="autoplay; encrypted-media"
            allowfullscreen
            referrerpolicy="strict-origin-when-cross-origin"
          ></iframe>
        </div>
      </div>
    </div>

    <script>
      (function () {
        "use strict";
        var prefersReducedMotion = matchMedia("(prefers-reduced-motion: reduce)");
        var SECTION_IDS = [
          "home",
          "problem",
          "solution",
          "businessmodel",
          "physicsengineering",
          "market",
          "team",
          "ask",
        ];

        /* ---------------------------------------------------------------
           Reveal-on-scroll. Base styles are fully visible; the hidden
           initial state only exists under html.js + no-preference, so
           reduced-motion and no-JS users never see hidden content.
           --------------------------------------------------------------- */
        var reveals = document.querySelectorAll(".reveal");
        if (prefersReducedMotion.matches || !("IntersectionObserver" in window)) {
          reveals.forEach(function (el) {
            el.classList.add("is-visible");
          });
        } else {
          var revealIO = new IntersectionObserver(
            function (entries, obs) {
              entries.forEach(function (e) {
                if (e.isIntersecting) {
                  e.target.classList.add("is-visible");
                  obs.unobserve(e.target); /* fire once */
                }
              });
            },
            { rootMargin: "0px 0px -10% 0px", threshold: 0.05 }
          );
          reveals.forEach(function (el) {
            revealIO.observe(el);
          });
        }

        /* ---------------------------------------------------------------
           Scroll-spy: highlight the active section in both navs + brand.
           One IntersectionObserver, viewport-centre band.
           --------------------------------------------------------------- */
        var navLinks = Array.prototype.slice.call(
          document.querySelectorAll('.primary-nav a, .dot-nav a, .brand')
        );
        var primaryNavUl = document.querySelector(".primary-nav ul");

        function setActive(id) {
          navLinks.forEach(function (a) {
            var href = a.getAttribute("href") || "";
            var isMatch =
              href === "#" + id || (a.classList.contains("brand") && id === "home");
            if (isMatch) {
              a.classList.add("active");
              a.setAttribute("aria-current", "true");
            } else {
              a.classList.remove("active");
              a.removeAttribute("aria-current");
            }
          });
          /* Keep the active chip visible in the mobile horizontal nav. */
          if (primaryNavUl && primaryNavUl.scrollWidth > primaryNavUl.clientWidth) {
            var chip = primaryNavUl.querySelector('a[href="#' + id + '"]');
            if (chip) {
              var target = chip.offsetLeft - primaryNavUl.clientWidth / 2 + chip.clientWidth / 2;
              primaryNavUl.scrollTo({
                left: target,
                behavior: prefersReducedMotion.matches ? "auto" : "smooth",
              });
            }
          }
        }

        if ("IntersectionObserver" in window) {
          var spyIO = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (e) {
                if (e.isIntersecting) setActive(e.target.id);
              });
            },
            { rootMargin: "-45% 0px -45% 0px", threshold: 0 }
          );
          SECTION_IDS.forEach(function (id) {
            var el = document.getElementById(id);
            if (el) spyIO.observe(el);
          });
        }

        /* ---------------------------------------------------------------
           Scroll progress bar — JS fallback when the native scroll
           timeline isn't available.
           --------------------------------------------------------------- */
        var supportsScrollTimeline = false;
        try {
          supportsScrollTimeline = CSS.supports("animation-timeline: scroll()");
        } catch (err) {
          supportsScrollTimeline = false;
        }
        if (!supportsScrollTimeline) {
          var bar = document.getElementById("scrollProgressBar");
          var onProgress = function () {
            var doc = document.documentElement;
            var max = doc.scrollHeight - doc.clientHeight;
            var p = max > 0 ? doc.scrollTop / max : 0;
            bar.style.transform = "scaleX(" + p + ")";
          };
          addEventListener("scroll", onProgress, { passive: true });
          addEventListener("resize", onProgress);
          onProgress();
        }

        /* ---------------------------------------------------------------
           Smooth in-page navigation WITH focus management. After the
           scroll we move keyboard focus to the target section (each
           section[id] has tabindex="-1") so anchor/skip/dot/Next jumps
           work for keyboard and screen-reader users.
           --------------------------------------------------------------- */
        document.addEventListener("click", function (e) {
          var a = e.target.closest && e.target.closest('a[href^="#"]');
          if (!a) return;
          var id = a.getAttribute("href").slice(1);
          if (!id) return;
          var target = document.getElementById(id);
          if (!target) return;
          e.preventDefault();
          var behavior = prefersReducedMotion.matches ? "auto" : "smooth";
          target.scrollIntoView({ behavior: behavior, block: "start" });
          if (history.pushState) history.pushState(null, "", "#" + id);
          /* preventScroll so focus doesn't override our margin-aware scroll. */
          target.focus({ preventScroll: true });
        });

        /* ---------------------------------------------------------------
           Back-to-top: reveal once the hero scrolls out of view.
           --------------------------------------------------------------- */
        var btt = document.getElementById("backToTop");
        var home = document.getElementById("home");
        if (btt && home && "IntersectionObserver" in window) {
          var bttIO = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (e) {
                btt.classList.toggle("is-visible", !e.isIntersecting);
              });
            },
            { threshold: 0 }
          );
          bttIO.observe(home);
        }

        /* ---------------------------------------------------------------
           Pitch-video lightbox.
           --------------------------------------------------------------- */
        var lb = document.getElementById("videoLightbox");
        var lbIframe = document.getElementById("lightboxIframe");
        var VIDEO_SRC =
          "https://www.youtube-nocookie.com/embed/7AhBzJ9Yg6M?rel=0&loop=0&controls=1&cc_load_policy=0&autoplay=1";
        var lastFocused = null;

        function openVideo() {
          lastFocused = document.activeElement;
          lbIframe.src = VIDEO_SRC;
          lb.classList.add("is-visible");
          document.body.style.overflow = "hidden";
          var closeBtn = lb.querySelector("[data-close-video]");
          if (closeBtn) closeBtn.focus();
        }
        function closeVideo() {
          lbIframe.src = "";
          lb.classList.remove("is-visible");
          document.body.style.overflow = "";
          if (lastFocused && lastFocused.focus) lastFocused.focus();
        }
        document.addEventListener("click", function (e) {
          if (e.target.closest && e.target.closest("[data-open-video]")) {
            e.preventDefault();
            openVideo();
          } else if (e.target.closest && e.target.closest("[data-close-video]")) {
            closeVideo();
          } else if (e.target === lb) {
            closeVideo();
          }
        });
        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape" && lb.classList.contains("is-visible")) closeVideo();
        });
      })();
    </script>
  </body>
</html>
