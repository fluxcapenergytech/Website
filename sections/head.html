<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FluxTech.</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="light only" />
    <meta name="description" content="Converting AI data centre waste heat into electricity." />
    <meta property="og:site_name" content="FluxTech." />
    <meta property="og:title" content="FluxTech." />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="Converting AI data centre waste heat into electricity." />
    <meta property="og:image" content="https://flux-tech.de/assets/images/social-card.jpg?v=e1d5cfd8" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="800" />
    <meta property="og:url" content="https://flux-tech.de" />
    <meta property="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://flux-tech.de" />
    <link
      href="https://fonts.googleapis.com/css2?display=swap&family=Poppins:ital,wght@0,400;0,600;0,700;1,400&family=Source+Code+Pro:ital,wght@0,400;0,700;1,400"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Mark JS as available before first paint so reveal-on-scroll can hide its
         initial state without ever hiding content from no-JS / reduced-motion users. -->
    <script>
      document.documentElement.classList.add("js");
    </script>
    <style>
      /* ===================================================================
         FluxTech — continuous-scroll stylesheet (rebuilt 2026).
         Replaces the Carrd-exported substrate (.instance-N classes + the
         display:none slide-switcher) with a single scrollable document.
         =================================================================== */

      /* ---- Reset (lean) ---- */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body,
      h1,
      h2,
      h3,
      p,
      ul,
      ol,
      li,
      figure,
      figcaption,
      blockquote {
        margin: 0;
        padding: 0;
      }
      ul,
      ol {
        list-style: none;
      }
      img,
      svg,
      canvas,
      iframe {
        display: block;
        max-width: 100%;
      }
      img {
        height: auto;
      }
      a {
        color: inherit;
      }
      :focus-visible {
        outline: 3px solid #007fad;
        outline-offset: 3px;
        border-radius: 2px;
      }

      /* ---- Tokens ---- */
      :root {
        --c-ink: #1a1d21;
        --c-muted: #5b6469;
        --c-teal: #007fad;
        --c-green: #009a62;
        --c-highlight: #cbf5e6;
        --c-border: #e3eae8;
        --c-tint: #f4f8f6;
        --c-card: #ffffff;
        --grad: linear-gradient(31deg, #007fad 0%, #009a62 70%);
        --font-head: "Poppins", system-ui, sans-serif;
        --font-body: "Source Code Pro", ui-monospace, monospace;
        --maxw: 54rem;
        --maxw-wide: 72rem;
        --header-h: 4rem;
        --radius: 14px;
        --shadow: 0 1px 2px rgba(16, 30, 28, 0.04), 0 8px 28px rgba(16, 30, 28, 0.06);
      }
      @media (max-width: 760px) {
        :root {
          --header-h: 6.4rem;
        }
      }

      html {
        font-size: 100%;
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family: var(--font-body);
        color: var(--c-ink);
        background: #ffffff;
        line-height: 1.7;
        min-height: 100vh;
        overflow-x: hidden;
        word-wrap: break-word;
      }

      /* ---- Smooth scroll + reveal motion: opt-in, reduced-motion safe ---- */
      @media (prefers-reduced-motion: no-preference) {
        html {
          scroll-behavior: smooth;
        }
        html.js .reveal {
          opacity: 0;
          transform: translateY(24px);
          transition:
            opacity 0.5s ease-out,
            transform 0.5s ease-out;
          will-change: opacity, transform;
        }
        html.js .reveal.is-visible {
          opacity: 1;
          transform: none;
        }
      }

      /* ===================================================================
         Skip link
         =================================================================== */
      .skip-link {
        position: absolute;
        left: 0.75rem;
        top: -3rem;
        z-index: 100;
        background: var(--c-ink);
        color: #fff;
        padding: 0.6rem 1rem;
        border-radius: 0 0 8px 8px;
        font-family: var(--font-head);
        font-size: 0.85rem;
        text-decoration: none;
        transition: top 0.2s ease;
      }
      .skip-link:focus {
        top: 0;
      }

      /* ===================================================================
         Scroll progress bar
         =================================================================== */
      .scroll-progress {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        z-index: 60;
        background: transparent;
        pointer-events: none;
      }
      .scroll-progress__bar {
        height: 100%;
        width: 100%;
        transform: scaleX(0);
        transform-origin: 0 50%;
        background: var(--grad);
      }
      /* JS fallback drives transform via --progress; native scroll timeline preferred. */
      @supports (animation-timeline: scroll()) {
        .scroll-progress__bar {
          animation: grow-progress linear both;
          animation-timeline: scroll(root block);
        }
        @keyframes grow-progress {
          from {
            transform: scaleX(0);
          }
          to {
            transform: scaleX(1);
          }
        }
      }

      /* ===================================================================
         Sticky header + primary nav
         =================================================================== */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(255, 255, 255, 0.88);
        -webkit-backdrop-filter: saturate(1.4) blur(10px);
        backdrop-filter: saturate(1.4) blur(10px);
        border-bottom: 1px solid var(--c-border);
      }
      .site-header__bar {
        max-width: var(--maxw-wide);
        margin: 0 auto;
        height: var(--header-h);
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0 1.25rem;
      }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        text-decoration: none;
        flex: 0 0 auto;
      }
      .brand img {
        height: 1.85rem;
        width: auto;
      }
      .brand__word {
        font-family: var(--font-head);
        font-weight: 700;
        font-size: 1.15rem;
        letter-spacing: -0.01em;
        background: var(--grad);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .primary-nav {
        margin-left: auto;
        min-width: 0;
      }
      .primary-nav ul {
        display: flex;
        align-items: center;
        gap: 0.15rem;
      }
      .primary-nav a {
        display: block;
        white-space: nowrap;
        text-decoration: none;
        font-family: var(--font-head);
        font-size: 0.82rem;
        font-weight: 400;
        color: var(--c-muted);
        padding: 0.4rem 0.62rem;
        border-radius: 8px;
        position: relative;
        transition:
          color 0.2s ease,
          background-color 0.2s ease;
      }
      .primary-nav a:hover {
        color: var(--c-ink);
        background: var(--c-tint);
      }
      .primary-nav a.active,
      .primary-nav a[aria-current="true"] {
        color: var(--c-teal);
        font-weight: 600;
      }
      .primary-nav a.active::after {
        content: "";
        position: absolute;
        left: 0.62rem;
        right: 0.62rem;
        bottom: 0.05rem;
        height: 2px;
        border-radius: 2px;
        background: var(--grad);
      }

      @media (max-width: 760px) {
        .site-header__bar {
          flex-direction: column;
          align-items: stretch;
          gap: 0.4rem;
          padding: 0.5rem 0 0.45rem;
        }
        .brand {
          padding: 0 1rem;
        }
        .primary-nav {
          margin-left: 0;
        }
        /* Horizontally scrollable chip row — labels stay visible, high scent. */
        .primary-nav ul {
          gap: 0.5rem;
          overflow-x: auto;
          padding: 0.1rem 1rem;
          scrollbar-width: none;
          -webkit-overflow-scrolling: touch;
        }
        .primary-nav ul::-webkit-scrollbar {
          display: none;
        }
        .primary-nav a {
          border: 1px solid var(--c-border);
          background: #fff;
          font-size: 0.8rem;
        }
        .primary-nav a.active {
          border-color: var(--c-green);
          background: var(--c-tint);
        }
        .primary-nav a.active::after {
          display: none;
        }
      }

      /* ===================================================================
         Side dot / chapter nav — desktop only
         =================================================================== */
      .dot-nav {
        position: fixed;
        top: 50%;
        right: 1.4rem;
        transform: translateY(-50%);
        z-index: 40;
      }
      .dot-nav ul {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      .dot-nav li {
        display: flex;
        justify-content: flex-end;
      }
      .dot-nav a {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        text-decoration: none;
        flex-direction: row-reverse;
      }
      .dot-nav__dot {
        width: 11px;
        height: 11px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #c2cdca;
        box-shadow: 0 0 0 0 rgba(0, 154, 98, 0.25);
        transition:
          transform 0.2s ease,
          background-color 0.2s ease,
          box-shadow 0.2s ease;
      }
      .dot-nav a:hover .dot-nav__dot {
        background: var(--c-green);
      }
      .dot-nav a.active .dot-nav__dot {
        background: var(--c-green);
        transform: scale(1.65);
        box-shadow: 0 0 0 4px rgba(0, 154, 98, 0.16);
      }
      .dot-nav__label {
        font-family: var(--font-head);
        font-size: 0.72rem;
        color: var(--c-ink);
        background: rgba(255, 255, 255, 0.92);
        padding: 0.12rem 0.5rem;
        border-radius: 6px;
        box-shadow: var(--shadow);
        white-space: nowrap;
        opacity: 0;
        transform: translateX(6px);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
      }
      .dot-nav a:hover .dot-nav__label,
      .dot-nav a:focus-visible .dot-nav__label,
      .dot-nav a.active .dot-nav__label {
        opacity: 1;
        transform: none;
      }
      @media (max-width: 1180px) {
        .dot-nav {
          display: none;
        }
      }

      /* ===================================================================
         Back to top
         =================================================================== */
      .back-to-top {
        position: fixed;
        right: 1.25rem;
        bottom: 1.25rem;
        z-index: 45;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.55rem 0.8rem;
        background: var(--c-ink);
        color: #fff;
        font-family: var(--font-head);
        font-size: 0.78rem;
        text-decoration: none;
        border-radius: 999px;
        box-shadow: var(--shadow);
        opacity: 0;
        visibility: hidden;
        transform: translateY(8px);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease,
          visibility 0.25s ease;
      }
      .back-to-top.is-visible {
        opacity: 1;
        visibility: visible;
        transform: none;
      }
      .back-to-top:hover {
        background: var(--c-teal);
      }

      /* ===================================================================
         Sections + layout
         =================================================================== */
      main {
        display: block;
      }
      .section {
        scroll-margin-top: calc(var(--header-h) + 1rem);
        padding: clamp(3.25rem, 7vw, 5.5rem) 0;
        border-bottom: 1px solid var(--c-border);
      }
      .section:nth-of-type(even) {
        background: var(--c-tint);
      }
      .section__inner {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 0 1.5rem;
      }
      .section:focus {
        outline: none;
      }

      /* Eyebrow / section index */
      .eyebrow {
        font-family: var(--font-head);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--c-green);
        margin-bottom: 0.6rem;
      }

      /* ---- Typography components ---- */
      .h-section {
        font-family: var(--font-head);
        font-weight: 700;
        font-size: clamp(1.7rem, 4vw, 2.35rem);
        line-height: 1.15;
        letter-spacing: -0.015em;
        background: var(--grad);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 1.5rem;
      }
      .prose {
        font-family: var(--font-body);
        font-size: 1rem;
        line-height: 1.75;
        color: var(--c-ink);
      }
      .prose + .prose {
        margin-top: 1.25rem;
      }
      .prose .p {
        display: block;
      }
      .prose .p + .p {
        margin-top: 1rem;
      }
      .prose strong {
        font-weight: 700;
        color: var(--c-ink);
      }
      .prose em {
        font-style: italic;
      }
      .prose a {
        color: var(--c-teal);
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .prose a:hover {
        text-decoration: none;
      }
      .lede {
        font-size: 1.12rem;
        line-height: 1.7;
      }
      mark {
        background: var(--c-highlight);
        color: inherit;
        padding: 0.04em 0.18em;
        border-radius: 3px;
      }
      .caption {
        font-family: var(--font-body);
        font-size: 0.8rem;
        line-height: 1.6;
        color: var(--c-muted);
      }
      .caption sub {
        font-size: 0.82em;
      }

      /* Inline thematic cross-link ("Find out more …") */
      .crosslink {
        margin-top: 1.5rem;
        font-size: 0.95rem;
        color: var(--c-muted);
      }
      .crosslink a {
        color: var(--c-teal);
      }

      /* Small utilities */
      .text-center {
        text-align: center;
      }
      .ask-mark {
        display: block;
        width: 3.75rem;
        height: auto;
        margin: 3rem auto 1.25rem;
      }

      /* "Next" sequential affordance */
      .next-eyebrow {
        display: block;
        font-family: var(--font-head);
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--c-muted);
        margin-bottom: 0.3rem;
        margin-top: 2.5rem;
      }
      .next-section {
        display: inline-flex;
        align-items: baseline;
        gap: 0.5rem;
        font-family: var(--font-head);
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        color: var(--c-ink);
        border-bottom: 2px solid transparent;
        transition: border-color 0.2s ease;
      }
      .next-section span {
        background: var(--grad);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .next-section .next-arrow {
        color: var(--c-green);
        transition: transform 0.2s ease;
      }
      .next-section:hover {
        border-color: var(--c-green);
      }
      .next-section:hover .next-arrow {
        transform: translateX(4px);
      }

      /* ===================================================================
         Hero
         =================================================================== */
      .hero {
        position: relative;
        text-align: center;
        padding-top: clamp(2.5rem, 6vw, 4rem);
        background:
          radial-gradient(60% 60% at 50% 0%, rgba(0, 154, 98, 0.08), rgba(255, 255, 255, 0)),
          #ffffff;
      }
      .hero__logo {
        width: 13rem;
        max-width: 70%;
        height: auto;
        margin: 0 auto 1.75rem;
      }
      .hero__tagline {
        font-family: var(--font-head);
        font-weight: 700;
        font-size: clamp(1.8rem, 5vw, 2.9rem);
        line-height: 1.12;
        letter-spacing: -0.02em;
        max-width: 22ch;
        margin: 0 auto 1.5rem;
        background: var(--grad);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .hero__body {
        max-width: 44ch;
        margin: 0 auto;
        text-align: left;
      }
      .hero__cta {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--font-head);
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        padding: 0.7rem 1.4rem;
        border-radius: 999px;
        cursor: pointer;
        border: 1px solid transparent;
        transition:
          transform 0.15s ease,
          box-shadow 0.2s ease,
          background-color 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
      }
      .btn--primary {
        background: var(--grad);
        color: #fff;
        box-shadow: var(--shadow);
      }
      .btn--primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 26px rgba(0, 127, 173, 0.28);
      }
      .btn--ghost {
        background: #fff;
        color: var(--c-ink);
        border-color: var(--c-border);
      }
      .btn--ghost:hover {
        border-color: var(--c-green);
        color: var(--c-green);
      }
      .hero__video {
        margin: 2.75rem auto 0;
        max-width: 46rem;
        aspect-ratio: 16 / 9;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        background: #000;
      }
      .hero__video iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
      .hero__partners {
        display: flex;
        flex-wrap: wrap;
        gap: 1.75rem;
        align-items: center;
        justify-content: center;
        margin: 2.75rem 0 0.75rem;
      }
      .hero__partners img {
        height: 2.4rem;
        width: auto;
        opacity: 0.92;
      }
      .hero__caption {
        text-align: center;
        max-width: 40ch;
        margin: 0 auto;
      }

      /* ===================================================================
         Figures (chart, diagrams)
         =================================================================== */
      .figure {
        margin: 2rem 0;
      }
      .figure img {
        width: 100%;
        height: auto;
        border-radius: var(--radius);
        border: 1px solid var(--c-border);
        background: #fff;
      }
      .figure figcaption {
        margin-top: 0.75rem;
        font-size: 0.8rem;
        color: var(--c-muted);
        line-height: 1.6;
      }
      .figure--chart {
        max-width: 42rem;
      }

      /* ===================================================================
         Feature list (highlighted claim rows)
         =================================================================== */
      .feature-list {
        display: grid;
        gap: 1rem;
        margin: 1.75rem 0 0;
      }
      .feature-list .p {
        display: block;
        background: var(--c-card);
        border: 1px solid var(--c-border);
        border-left: 4px solid var(--c-green);
        border-radius: 12px;
        padding: 1rem 1.2rem;
        box-shadow: var(--shadow);
      }
      .feature-list .p + .p {
        margin-top: 0;
      }
      .feature-list mark {
        background: transparent;
        padding: 0;
        font-weight: 700;
        font-family: var(--font-head);
        color: var(--c-teal);
        display: block;
        margin-bottom: 0.25rem;
      }

      /* ===================================================================
         Card grid (business model + market reasons)
         =================================================================== */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
        gap: 1.1rem;
        margin: 1.75rem 0 0;
      }
      .card {
        background: var(--c-card);
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        padding: 1.35rem 1.4rem;
        box-shadow: var(--shadow);
        font-family: var(--font-body);
        font-size: 0.95rem;
        line-height: 1.65;
      }
      .card__icon {
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        margin-bottom: 0.9rem;
        border: 1px solid var(--c-border);
      }
      .card .p {
        display: block;
      }
      .card .p + .p {
        margin-top: 0.65rem;
      }
      .card strong:first-child,
      .card .p:first-child strong {
        display: block;
        font-family: var(--font-head);
        font-weight: 600;
        font-size: 1.02rem;
        color: var(--c-ink);
        margin-bottom: 0.3rem;
      }
      .card mark {
        background: var(--c-highlight);
      }
      /* The bold "Title.<br> body" pattern: title is already a block, drop the <br>. */
      .card br,
      .step__body br {
        display: none;
      }

      /* ===================================================================
         Team cards
         =================================================================== */
      .team-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
        margin-top: 1.5rem;
      }
      .member {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 1.5rem;
        align-items: start;
        background: var(--c-card);
        border: 1px solid var(--c-border);
        border-radius: var(--radius);
        padding: 1.6rem;
        box-shadow: var(--shadow);
      }
      .member__photo {
        width: 7rem;
        height: 7rem;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #fff;
        box-shadow: 0 0 0 1px var(--c-border);
      }
      .member__bio .p {
        display: block;
      }
      .member__bio .p + .p {
        margin-top: 0.85rem;
      }
      .member__bio mark {
        background: transparent;
        padding: 0;
        font-family: var(--font-head);
        font-weight: 600;
        color: var(--c-green);
      }
      .member__bio strong {
        font-family: var(--font-head);
        font-weight: 600;
      }
      .member__bio .p:first-child strong {
        display: block;
        font-size: 1.15rem;
        color: var(--c-ink);
        margin-bottom: 0.2rem;
      }
      .member__bio em {
        display: block;
        margin-top: 0.85rem;
        padding-left: 1rem;
        border-left: 3px solid var(--c-highlight);
        font-style: italic;
        color: var(--c-muted);
      }
      @media (max-width: 560px) {
        .member {
          grid-template-columns: 1fr;
        }
      }

      /* ===================================================================
         Physics & Engineering walkthrough — numbered, sequenced steps
         =================================================================== */
      .walkthrough {
        counter-reset: step;
        margin: 2.25rem 0 0;
        position: relative;
      }
      .step {
        position: relative;
        display: grid;
        grid-template-columns: 4.25rem 1fr;
        gap: 1.4rem;
        padding-bottom: 2.5rem;
      }
      .step:last-child {
        padding-bottom: 0;
      }
      .step__rail {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.7rem;
      }
      .step__num {
        flex: 0 0 auto;
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-family: var(--font-head);
        font-weight: 700;
        font-size: 1.05rem;
        color: #fff;
        background: var(--grad);
        box-shadow: var(--shadow);
      }
      .step__num::before {
        counter-increment: step;
        content: counter(step, decimal-leading-zero);
      }
      /* Connector line between steps */
      .step__line {
        flex: 1 1 auto;
        width: 2px;
        min-height: 1.5rem;
        background: linear-gradient(var(--c-green), var(--c-border));
        border-radius: 2px;
      }
      .step:last-child .step__line {
        display: none;
      }
      .step__icon {
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 50%;
        border: 1px solid var(--c-border);
        background: #fff;
      }
      .step__body {
        padding-top: 0.35rem;
      }
      .step__body .p strong,
      .step__body strong {
        display: block;
        font-family: var(--font-head);
        font-weight: 600;
        font-size: 1.12rem;
        color: var(--c-ink);
        margin-bottom: 0.35rem;
      }
      .step__diagram {
        margin-top: 1.1rem;
        max-width: 22rem;
      }
      .step__diagram img {
        width: 100%;
        height: auto;
        border-radius: 12px;
        border: 1px solid var(--c-border);
      }
      @media (max-width: 560px) {
        .step {
          grid-template-columns: 3.25rem 1fr;
          gap: 1rem;
        }
        .step__num {
          width: 2.5rem;
          height: 2.5rem;
          font-size: 0.9rem;
        }
        .step__icon {
          width: 1.9rem;
          height: 1.9rem;
        }
      }

      /* ===================================================================
         Video lightbox (pitch video, launched from hero)
         =================================================================== */
      .video-lightbox {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 90;
        background: rgba(10, 14, 13, 0.88);
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .video-lightbox.is-visible {
        display: flex;
      }
      .video-lightbox__container {
        position: relative;
        width: 100%;
        max-width: 960px;
      }
      .video-lightbox__wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
      }
      .video-lightbox__wrap iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .video-lightbox__close {
        position: absolute;
        top: -2.75rem;
        right: 0;
        background: none;
        border: none;
        color: #fff;
        font-size: 2rem;
        line-height: 1;
        cursor: pointer;
        padding: 0.25rem 0.5rem;
      }

      /* ===================================================================
         Site footer
         =================================================================== */
      .site-footer {
        background: var(--c-ink);
        color: #cdd6d3;
        padding: 2.5rem 1.5rem;
        text-align: center;
        font-family: var(--font-body);
        font-size: 0.82rem;
        line-height: 1.7;
      }
      .site-footer a {
        color: #fff;
      }
      .site-footer__social {
        display: flex;
        justify-content: center;
        margin-bottom: 1rem;
      }
      .site-footer__social a {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.22);
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease;
      }
      .site-footer__social a:hover {
        background: var(--c-green);
        border-color: var(--c-green);
      }
      .site-footer__social svg {
        width: 1.1rem;
        height: 1.1rem;
        fill: currentColor;
      }
      .site-footer__social .label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }
      .site-footer p + p {
        margin-top: 0.4rem;
      }
      .site-footer .muted {
        color: #8a948f;
      }
    </style>
